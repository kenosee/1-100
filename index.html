<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <title>Ugani število 1–100</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1e3a8a, #020617);
        color: #f9fafb;
      }

      .app-root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .game-card {
        width: 100%;
        max-width: 420px;
        background: rgba(15, 23, 42, 0.92);
        border-radius: 18px;
        padding: 24px 22px 28px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.35);
      }

      .game-title {
        text-align: center;
        font-size: 2.4rem;
        margin: 0 0 4px;
        letter-spacing: 0.04em;
      }

      .game-subtitle {
        text-align: center;
        font-size: 0.98rem;
        margin: 0 0 18px;
        color: #e5e7eb;
      }

      .guess-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }

      .guess-input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.8);
        background: rgba(15, 23, 42, 0.6);
        color: #f9fafb;
        font-size: 0.98rem;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      .guess-input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
        background: rgba(15, 23, 42, 0.9);
      }

      .guess-input::placeholder {
        color: #9ca3af;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 9px 16px;
        font-size: 0.98rem;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease,
          color 0.12s ease;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: default;
        box-shadow: none;
        transform: none;
      }

      .btn-check {
        background: linear-gradient(135deg, #22c55e, #4ade80);
        color: #022c22;
        font-weight: 600;
        box-shadow: 0 10px 20px rgba(34, 197, 94, 0.35);
      }

      .btn-check:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 26px rgba(34, 197, 94, 0.4);
      }

      .btn-check:not(:disabled):active {
        transform: translateY(0);
        box-shadow: 0 8px 16px rgba(34, 197, 94, 0.35);
      }

      .btn-secondary {
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        border: 1px solid rgba(148, 163, 184, 0.8);
      }

      .btn-secondary:hover {
        background: rgba(30, 64, 175, 0.9);
        border-color: rgba(191, 219, 254, 0.95);
      }

      .btn-primary {
        background: linear-gradient(135deg, #22c55e, #4ade80);
        color: #022c22;
        font-weight: 600;
        min-width: 140px;
      }

      .attempts {
        font-size: 0.95rem;
        margin-bottom: 8px;
        color: #cbd5f5;
      }

      .message {
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .message-error {
        background: rgba(220, 38, 38, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.7);
        color: #fecaca;
      }

      .message-hint {
        background: rgba(56, 189, 248, 0.12);
        border: 1px solid rgba(56, 189, 248, 0.7);
        color: #e0f2fe;
      }

      .new-number-btn {
        width: 100%;
        margin-top: 4px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 20;
        backdrop-filter: blur(3px);
      }

      .modal-backdrop.visible {
        display: flex;
      }

      .modal {
        width: 100%;
        max-width: 360px;
        background: rgba(15, 23, 42, 0.98);
        border-radius: 20px;
        padding: 22px 20px 20px;
        text-align: center;
        border: 1px solid rgba(148, 163, 184, 0.8);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
        animation-duration: 0.4s;
        animation-fill-mode: both;
      }

      .modal-title {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      .modal-message {
        margin: 0 0 18px;
        font-size: 0.98rem;
        color: #e5e7eb;
      }

      .modal-win {
        animation-name: modal-pop-win;
      }

      .modal-lose {
        animation-name: modal-shake-lose;
      }

      @keyframes modal-pop-win {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        60% {
          opacity: 1;
          transform: scale(1.03);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes modal-shake-lose {
        0% {
          opacity: 0;
          transform: translateX(0);
        }
        40% {
          opacity: 1;
        }
        60% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
        90% {
          transform: translateX(-3px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .confetti-layer {
        pointer-events: none;
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 10;
        background-image: radial-gradient(
            circle at 10% 20%,
            rgba(248, 250, 252, 0.12) 0,
            transparent 40%
          ),
          radial-gradient(circle at 80% 30%, rgba(52, 211, 153, 0.25) 0, transparent 45%),
          radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.25) 0, transparent 45%);
        animation: confetti-fade 1.8s ease-out forwards;
        display: none;
      }

      .confetti-layer.visible {
        display: block;
      }

      @keyframes confetti-fade {
        0% {
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @media (min-width: 480px) {
        .game-card {
          padding: 26px 26px 30px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Glavni vsebinski ovitek aplikacije -->
    <div class="app-root">
      <div class="game-card">
        <!-- Naslov igre 1–100 -->
        <h1 class="game-title">1–100</h1>
        <!-- Kratek opis naloge -->
        <p class="game-subtitle">Uganite skrito število med 1 in 100.</p>

        <form class="guess-form" id="guess-form" novalidate>
          <input
            type="text"
            id="guess-input"
            class="guess-input"
            placeholder="Vnesite število med 1 in 100"
          />
          <button type="submit" class="btn btn-check" id="check-btn">Preveri</button>
        </form>

        <div class="attempts">
          <span>Preostali poskusi: <span id="attempts-left">10</span></span>
        </div>

        <div id="error-message" class="message message-error" style="display: none;"></div>
        <div id="hint-message" class="message message-hint" style="display: none;"></div>

        <button type="button" class="btn btn-secondary new-number-btn" id="new-number-btn">
          Novo skrito število
        </button>
      </div>

      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" id="modal">
          <h2 class="modal-title" id="modal-title"></h2>
          <p class="modal-message" id="modal-message"></p>
          <button class="btn btn-primary" id="modal-button">Poskusi znova</button>
        </div>
      </div>

      <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>
    </div>

    <script>
      (function () {
        // Največje dovoljeno število poskusov v eni igri
        const MAX_ATTEMPTS = 10;
        // Trenutno skrito (naključno) število med 1 in 100
        let secretNumber = getRandomNumber();
        // Preostali poskusi
        let attemptsLeft = MAX_ATTEMPTS;
        // Stanje igre: "idle" (igra poteka), "won" (zmaga), "lost" (poraz)
        let gameStatus = 'idle'; // idle | won | lost

        // Vsi uporabniški teksti v slovenščini
        const texts = {
          errorNotNumber: 'Vnesite veljavno število.',
          errorOutOfRange: 'Število mora biti med 1 in 100.',
          hintMuchLower: 'Število je veliko manjše.',
          hintLower: 'Število je manjše.',
          hintMuchHigher: 'Število je veliko večje.',
          hintHigher: 'Število je večje.',
          winTitle: 'Čestitamo!',
          winMessage: 'Uspešno ste uganili skrito število.',
          loseTitle: 'Poskusi znova',
          loseMessagePrefix: 'Poskusi so se končali. Pravilno število je bilo ',
          playAgain: 'Poskusi znova',
        };

        // Sklici na elemente v DOM-u
        const form = document.getElementById('guess-form');
        const guessInput = document.getElementById('guess-input');
        const checkBtn = document.getElementById('check-btn');
        const attemptsLeftEl = document.getElementById('attempts-left');
        const errorEl = document.getElementById('error-message');
        const hintEl = document.getElementById('hint-message');
        const newNumberBtn = document.getElementById('new-number-btn');

        const modalBackdrop = document.getElementById('modal-backdrop');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalButton = document.getElementById('modal-button');
        const confettiLayer = document.getElementById('confetti-layer');

        // Ustvari novo naključno število med 1 in 100
        function getRandomNumber() {
          return Math.floor(Math.random() * 100) + 1;
        }

        // Ponastavi igro na začetno stanje
        function resetGame() {
          secretNumber = getRandomNumber();
          attemptsLeft = MAX_ATTEMPTS;
          gameStatus = 'idle';
          attemptsLeftEl.textContent = attemptsLeft.toString();
          guessInput.value = '';
          hideError();
          hideHint();
          hideModal();
          hideConfetti();
        }

        // Prikaži napako pod vnosnim poljem
        function showError(message) {
          errorEl.textContent = message;
          errorEl.style.display = 'block';
        }

        // Skrij napako
        function hideError() {
          errorEl.textContent = '';
          errorEl.style.display = 'none';
        }

        // Prikaži namig (večje/manjše, veliko večje/manjše)
        function showHint(message) {
          hintEl.textContent = message;
          hintEl.style.display = 'block';
        }

        // Skrij namig
        function hideHint() {
          hintEl.textContent = '';
          hintEl.style.display = 'none';
        }

        // Prikaži zmagovalno modalno okno in učinek konfeti
        function showModalWin() {
          modalTitle.textContent = texts.winTitle;
          modalMessage.textContent = texts.winMessage;
          modal.classList.remove('modal-lose');
          modal.classList.add('modal-win');
          modalBackdrop.classList.add('visible');
          modalButton.textContent = texts.playAgain;
          showConfetti();
        }

        // Prikaži modalno okno za poraz z pravilnim številom
        function showModalLose() {
          modalTitle.textContent = texts.loseTitle;
          modalMessage.textContent = texts.loseMessagePrefix + secretNumber + '.';
          modal.classList.remove('modal-win');
          modal.classList.add('modal-lose');
          modalBackdrop.classList.add('visible');
          modalButton.textContent = texts.playAgain;
          hideConfetti();
        }

        // Skrij modalno okno
        function hideModal() {
          modalBackdrop.classList.remove('visible');
        }

        // Vključi sloj konfeti za kratek čas
        function showConfetti() {
          confettiLayer.classList.add('visible');
          setTimeout(hideConfetti, 1800);
        }

        // Skrij sloj konfeti
        function hideConfetti() {
          confettiLayer.classList.remove('visible');
        }

        // Obdelava dogodka oddaje obrazca (klik na "Preveri" ali Enter)
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          if (gameStatus !== 'idle') {
            return;
          }

          const value = guessInput.value.trim();
          if (!value) {
            showError(texts.errorNotNumber);
            return;
          }

          const guess = Number(value);
          if (Number.isNaN(guess)) {
            showError(texts.errorNotNumber);
            return;
          }

          if (guess < 1 || guess > 100) {
            showError(texts.errorOutOfRange);
            return;
          }

          hideError();

          if (guess === secretNumber) {
            hideHint();
            gameStatus = 'won';
            showModalWin();
            return;
          }

          const diff = Math.abs(guess - secretNumber);
          if (guess > secretNumber) {
            if (diff >= 20) {
              showHint(texts.hintMuchLower);
            } else {
              showHint(texts.hintLower);
            }
          } else {
            if (diff >= 20) {
              showHint(texts.hintMuchHigher);
            } else {
              showHint(texts.hintHigher);
            }
          }

          attemptsLeft -= 1;
          attemptsLeftEl.textContent = attemptsLeft.toString();

          if (attemptsLeft <= 0) {
            gameStatus = 'lost';
            showModalLose();
          }
        });

        newNumberBtn.addEventListener('click', function () {
          resetGame();
        });

        // Gumb v modalu – začne novo igro
        modalButton.addEventListener('click', function () {
          resetGame();
        });

        // Začetno stanje igre ob nalaganju strani
        resetGame();
      })();
    </script>
  </body>
</html>
